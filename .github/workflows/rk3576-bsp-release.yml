name: RK3576 BSP Release

on:
  push:
    branches:
      - main
    tags:
      - rk3576-v*
  workflow_dispatch:
    inputs:
      manifest_ref:
        description: Manifest branch, tag, or ref to build.
        required: true
        default: main
      channel:
        description: Artifact channel.
        required: true
        type: choice
        default: scratch
        options:
          - scratch
          - dev
          - candidate
          - stable
      version:
        description: Release tag. Candidate/stable dispatch must build the matching rk3576-v* tag.
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: rk3576-bsp-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish update.img
    runs-on:
      - self-hosted
      - linux
      - x64
      - rk3576
      - bsp
    timeout-minutes: 1440
    env:
      AWS_DEFAULT_REGION: eu-north-1
      AWS_REGION: eu-north-1
      DEFCONFIG: rockchip_rk3576_lapis_defconfig
      MANIFEST_FILE: rk3576-debian-ab.xml
      MANIFEST_URL: https://github.com/pamir-ai-pkgs/manifest
      MIN_FREE_GIB: "50"
      PRE_COMMIT_HOME: /srv/bsp/pre-commit-cache
      REPO_MIRROR: /srv/bsp/repo-mirror
      S3_BUCKET: distiller-os-release-artifacts
      UV_CACHE_DIR: /srv/bsp/uv-cache
      WORK_ROOT: /srv/bsp/workspaces
      XDG_CACHE_HOME: /srv/bsp/cache

    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v6.0.3
        with:
          path: manifest-checkout

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install repo tool
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          if ! command -v repo >/dev/null 2>&1; then
            curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo \
              -o "$HOME/.local/bin/repo"
            chmod 0755 "$HOME/.local/bin/repo"
          fi
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Configure GitHub authentication
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PAMIR_GITHUB_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/pamir-ai-pkgs/".insteadOf \
            "https://github.com/pamir-ai-pkgs/"
          gh auth status

      - name: Resolve build parameters
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ inputs.channel }}
          DISPATCH_MANIFEST_REF: ${{ inputs.manifest_ref }}
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          manifest_ref="${DISPATCH_MANIFEST_REF:-main}"
          channel="${DISPATCH_CHANNEL:-dev}"
          version="${DISPATCH_VERSION:-}"
          stable_tag_regex='^rk3576-v[0-9]+[.][0-9]+[.][0-9]+$'
          candidate_tag_regex='^rk3576-v[0-9]+[.][0-9]+[.][0-9]+-rc[.][0-9]+$'

          if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]]; then
            if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ $candidate_tag_regex ]]; then
              manifest_ref="refs/tags/$GITHUB_REF_NAME"
              channel="candidate"
              version="$GITHUB_REF_NAME"
            elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ $stable_tag_regex ]]; then
              manifest_ref="refs/tags/$GITHUB_REF_NAME"
              channel="stable"
              version="$GITHUB_REF_NAME"
            elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == rk3576-v* ]]; then
              echo "unsupported RK3576 release tag: $GITHUB_REF_NAME" >&2
              echo "use rk3576-vX.Y.Z or rk3576-vX.Y.Z-rc.N" >&2
              exit 1
            else
              manifest_ref="$GITHUB_REF_NAME"
              channel="dev"
              version="rk3576-dev-${GITHUB_SHA:0:12}"
            fi
          elif [[ "$channel" == "candidate" ]]; then
            if [[ -z "$version" ]]; then
              version="${manifest_ref#refs/tags/}"
            fi
            if [[ ! "$version" =~ $candidate_tag_regex ]]; then
              echo "candidate dispatch requires rk3576-vX.Y.Z-rc.N version" >&2
              exit 1
            fi
            if [[ "$manifest_ref" == "$version" ]]; then
              manifest_ref="refs/tags/$version"
            fi
            if [[ "$manifest_ref" != "refs/tags/$version" ]]; then
              echo "candidate dispatch must build the same tag it publishes" >&2
              exit 1
            fi
          elif [[ "$channel" == "stable" ]]; then
            if [[ -z "$version" ]]; then
              version="${manifest_ref#refs/tags/}"
            fi
            if [[ ! "$version" =~ $stable_tag_regex ]]; then
              echo "stable dispatch requires rk3576-vX.Y.Z version" >&2
              exit 1
            fi
            if [[ "$manifest_ref" == "$version" ]]; then
              manifest_ref="refs/tags/$version"
            fi
            if [[ "$manifest_ref" != "refs/tags/$version" ]]; then
              echo "stable dispatch must build the same tag it publishes" >&2
              exit 1
            fi
          fi

          build_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          sdk_dir="${WORK_ROOT%/}/pamir-rk3576-${channel}"

          {
            echo "BUILD_ID=$build_id"
            echo "CHANNEL=$channel"
            echo "MANIFEST_REF=$manifest_ref"
            echo "SDK_DIR=$sdk_dir"
            echo "VERSION=${version:-rk3576-${channel}-${build_id}}"
          } >>"$GITHUB_ENV"

      - name: Bootstrap BSP tools
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PAMIR_GITHUB_TOKEN }}
        run: |
          mkdir -p "$SDK_DIR" "$UV_CACHE_DIR" "$XDG_CACHE_HOME" "$PRE_COMMIT_HOME" "$REPO_MIRROR"
          cd "$SDK_DIR"
          python3 --version
          repo_init_args=()
          if [[ -d "$REPO_MIRROR/.repo" && "$MANIFEST_REF" != refs/tags/* ]]; then
            repo_init_args+=(--reference="$REPO_MIRROR")
          fi
          if [[ "$MANIFEST_REF" == refs/tags/* && -d .repo/manifests ]]; then
            git -C .repo/manifests fetch --force "$MANIFEST_URL" \
              "$MANIFEST_REF:$MANIFEST_REF"
          fi
          repo init -u "$MANIFEST_URL" -b "$MANIFEST_REF" -m "$MANIFEST_FILE" \
            "${repo_init_args[@]}"
          repo sync -j"$(nproc)" --current-branch --optimized-fetch \
            --prune --fail-fast --verify bsp-tools
          uv --project bsp-tools sync --python /usr/bin/python3 --group dev --locked

      - name: Validate release tooling
        shell: bash
        run: |
          cd "$SDK_DIR/bsp-tools"
          uv run --locked pre-commit run --all-files

      - name: Runner preflight
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PAMIR_GITHUB_TOKEN }}
        run: |
          cd "$SDK_DIR"
          rm -rf output rockdev
          bsp-tools/ci/preflight-runner.sh

      - name: Build and upload release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PAMIR_GITHUB_TOKEN }}
        run: |
          cd "$SDK_DIR"
          bsp-tools/ci/build-and-upload-release.sh

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          cd "$SDK_DIR"
          bsp-tools/ci/publish-github-release.sh

      - name: Remove ephemeral GitHub token rewrite
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PAMIR_GITHUB_TOKEN }}
        run: |
          git config --global --remove-section \
            "url.https://x-access-token:${GH_TOKEN}@github.com/pamir-ai-pkgs/" || true
